## مقدمة

شهد العالم الرأسمالي خلال القرن 19م تحولات عميقة شملت الميادين الاقتصادية والمالية والاجتماعية والفكرية. وانطلقت من أوروبا الغربية، مهد الثورة الصناعية، ثم امتدت إلى الولايات المتحدة الأمريكية واليابان. وساهم التطور العلمي والتقني، واتساع استعمال الآلة، وتطور النقل والمواصلات، وظهور الشركات الكبرى والأبناك والبورصات في نمو الإنتاج وتوسيع المبادلات. كما ترتبت عنها تحولات اجتماعية تمثلت في نمو المدن، وتصاعد نفوذ البورجوازية، وتكاثر الطبقة العاملة، وظهور الفكر الاشتراكي والحركة النقابية.

**فما مظاهر هذه التحولات؟ وما العوامل التي ساهمت فيها؟ وما أبرز نتائجها الاجتماعية والفكرية؟**

## 1- التحولات الاقتصادية المعززة للرأسمالية

### أ- تطور الإنتاج الصناعي

عرف القرن 19م تطورًا صناعيًا كبيرًا ارتبط بالثورتين الصناعيتين الأولى والثانية. اعتمدت الأولى على الفحم والآلة البخارية، وشملت النسيج والحديد والسكك والسفن البخارية. أما الثانية فارتبطت بالكهرباء والنفط والفولاذ والصناعات الكيماوية والميكانيكية والكهربائية والسيارات.

ارتفع إنتاج الفحم والحديد والفولاذ، وازدادت مساهمة الصناعة في الناتج الداخلي الخام، وظهرت مراكز صناعية ومدن كبرى قرب المناجم والموانئ ومصادر الطاقة، مثل مانشستر. وحل المصنع العصري محل المشاغل والمانيفاكتورات التقليدية، وقام على الآلات وتقسيم العمل والتخصص والمراقبة، مما رفع الإنتاجية.

### ب- تطور النشاط الفلاحي

شملت التحولات الفلاحية:

- تطوير السدود والقنوات وتقنيات السقي.
- استعمال الأسمدة الطبيعية والكيماوية.
- إدخال المحراث الآلي وآلات البذر والحصاد والدرس.
- تحسين البذور والسلالات والتهجين والاستفادة من علم الوراثة.
- تعويض إراحة الأرض بالدورة الزراعية.
- استصلاح الأراضي وتجفيف المستنقعات.
- ارتباط الفلاحة بالصناعة والسوق.

وانتقلت الفلاحة من نشاط معيشي تقليدي إلى فلاحة رأسمالية تسويقية، وظهرت ضيعات كبرى تعتمد رؤوس الأموال والآلات والعمال المأجورين.

### ج- تطور النشاط التجاري

تجلى تطور التجارة في:

- ارتفاع المبادلات بين الدول الرأسمالية.
- نمو التجارة بعيدة المدى.
- اعتماد التبادل الحر وتقليص الحواجز الجمركية في فترات معينة.
- توسع الأسواق الداخلية مع نمو المدن والسكان.
- ظهور المتاجر الكبرى والإشهار والعلامات التجارية والأسعار المحددة.
- تحسن التخزين والتعبئة والنقل والتوزيع.
- انتشار المعارض التجارية والصناعية الدولية.

غير أن العلاقات مع البلدان غير الصناعية كانت غير متكافئة، إذ تحولت المستعمرات إلى مصادر للمواد الأولية وأسواق للمنتجات المصنعة.

## 2- عوامل التحولات الاقتصادية

### أ- التقدم العلمي والتقني

تقدمت الفيزياء والكيمياء والبيولوجيا والطب، وربطت المدارس والجامعات العلم بالصناعة. ومن أبرز التقنيات والاختراعات:

- تطوير الآلة البخارية.
- تقنية بيسمر لإنتاج الفولاذ.
- المحركات والآلات الميكانيكية.
- آلة الخياطة والآلات الحاصدة والدارسة.
- القاطرات البخارية.
- التلغراف والهاتف.
- الكهرباء والإنارة وتشغيل الآلات.
- محركات الاحتراق الداخلي المعتمدة على النفط.

واستفادت الفلاحة من الآلات وعلوم التربة والنبات والوراثة.

### ب- التنظيم الاقتصادي الليبرالي

دافع الفكر الليبرالي عن:

- الملكية الفردية لوسائل الإنتاج.
- حرية الاستثمار والمبادرة.
- حرية المبادلات.
- قانون العرض والطلب.
- المنافسة وتقليص تدخل الدولة.

وأجبرت المنافسة المؤسسات على تجديد التقنيات وتحسين الجودة وتقليص التكاليف. وحل المصنع العصري والضيعة الرأسمالية والمتجر الكبير محل التنظيمات التقليدية.

### ج- التركيز الرأسمالي

اتخذ التركيز ثلاثة أشكال:

#### التركيز الأفقي

اندماج مؤسسات تشتغل في النشاط نفسه لتقليص المنافسة والتحكم في الإنتاج والأسعار.

#### التركيز العمودي

اندماج مؤسسات تتكامل من استخراج المواد الأولية إلى التصنيع والنقل والتسويق.

#### الهولدينغ

شركة مالية تسيطر على شركات أخرى عبر امتلاك أسهمها، ولو اشتغلت في قطاعات مختلفة.

وأدى التركيز إلى ظهور مؤسسات احتكارية كبرى ذات نفوذ اقتصادي وسياسي.

### د- ثورة النقل والمواصلات

افتتح خط ستوكتون–دارلينغتون سنة 1825م، وانتشرت السكك الحديدية فربطت المناجم بالمصانع والأسواق، وفكت العزلة ووحدت الأسواق الوطنية وحفزت الحديد والفولاذ. وتطورت السفن البخارية والمعدنية، وقل زمن الرحلات وتكلفتها، وساهم افتتاح قناة السويس سنة 1869م في اختصار الطريق إلى آسيا. كما سرع التلغراف والهاتف والبريد انتقال الأخبار والصفقات.

### هـ- الفاعلون الاقتصاديون الجدد

#### الشركات المساهمة

جمعت رؤوس أموال ضخمة عبر بيع الأسهم ووزعت المخاطر ومولت المناجم والمصانع والسكك والموانئ.

#### المقاولات العائلية الكبرى

ظهرت شركات مثل كروب بألمانيا وشنايدر بفرنسا، واكتسب أصحابها نفوذًا اقتصاديًا وسياسيًا.

#### الأبناك والبورصات

مولت الأبناك الصناعة والتجارة والمشاريع الكبرى وامتلكت أسهم الشركات، فاندفع الرأسمال البنكي نحو الصناعة. وساهمت البورصات في تداول الأسهم والسندات وتوجيه المدخرات نحو الاستثمار.

## 3- الانتقال إلى الرأسمالية المالية

مر النظام الرأسمالي من الرأسمالية التجارية إلى الصناعية، ثم إلى المالية خلال النصف الثاني من القرن 19م نتيجة دور الأبناك والبورصات والشركات المساهمة واندماج الرأسمال البنكي بالصناعي. وظهرت مجموعات تحتكر قطاعات واسعة وتبحث عن مجالات لاستثمار رؤوس الأموال في الخارج، مما مهد للإمبريالية.

### أزمة 1873م

ارتبطت بفائض الإنتاج وتراجع الأسعار وإفلاس المؤسسات، ثم امتدت إلى الفلاحة والتجارة. ومن مظاهرها:

- تراكم المنتجات وضعف الاستهلاك.
- انخفاض الأسعار والأرباح.
- إفلاس الشركات والأبناك.
- تراجع الاستثمار والبطالة.
- تضرر الفلاحين.
- اشتداد المنافسة.

ودفعت الأزمة إلى الحمائية والتركيز والتوسع الخارجي بحثًا عن الأسواق والمواد الأولية ومجالات الاستثمار.

## 4- التحولات الاجتماعية

### أ- التحولات الديموغرافية

تزايد السكان نتيجة ارتفاع الولادات وانخفاض الوفيات بفضل تحسن التغذية وتراجع المجاعات وتقدم الطب واللقاحات والصحة العمومية. ووفر ذلك يدًا عاملة وأسواقًا أوسع.

### ب- النمو الحضري والهجرة القروية

دفعت مكننة الفلاحة وضعف دخل الفلاحين وتضرر الحرف ونمو الصناعة سكان البوادي إلى المدن. فاتسعت المدن وظهرت مراكز صناعية جديدة، لكن ظهرت أحياء عمالية مكتظة وضعيفة التجهيز وانتشرت الأمراض.

### ج- تغير البنية الاجتماعية

#### البورجوازية

ضمت أصحاب المصانع والأبناك والشركات والتجار الكبار والضيعات، وسيطرت على وسائل الإنتاج واكتسبت نفوذًا سياسيًا.

#### النبلاء

تراجعت امتيازاتهم، لكن بعضهم حافظ على نفوذه بالاستثمار أو المصاهرة مع البورجوازية.

#### الطبقة العاملة

ضمت عمال المصانع والمناجم والسكك والموانئ، وعانت الأجور الضعيفة وطول ساعات العمل وغياب الحماية والسكن غير الصحي وسوء التغذية وتشغيل النساء والأطفال، فظهرت الاحتجاجات والتنظيمات العمالية.

## 5- التحولات الفكرية

### أ- الفكر الليبرالي

عبر عن مصالح البورجوازية، ودافع آدم سميث وغيره عن الحرية الاقتصادية والملكية الفردية والمنافسة. لكن تطبيقه وسع الفوارق وترك العمال دون حماية.

### ب- الفكر الاشتراكي

انتقد الاستغلال وتفاوت الثروة وسيطرة البورجوازية.

#### الاشتراكية الطوباوية

دعت إلى العدالة والتعاون والتعاونيات والمجتمعات النموذجية، ومن روادها سان سيمون وشارل فورييه وروبرت أووين.

#### الاشتراكية الفوضوية

رفضت سلطة الدولة وأشكال السيطرة، ومن أبرز ممثليها برودون.

#### الاشتراكية العلمية

ارتبطت بماركس وإنجلز، واعتبرت الصراع الطبقي أساس التاريخ، ودعت إلى تنظيم العمال وإلغاء الملكية الخاصة لوسائل الإنتاج وإقامة المجتمع الاشتراكي.

## 6- الحركة النقابية

بدأ العمال بجمعيات وصناديق للتعاون، ثم ظهرت نقابات قوية في بريطانيا وفرنسا وألمانيا، وطالبت برفع الأجور وتقليص ساعات العمل وتحسين السلامة ومنع استغلال الأطفال والاعتراف بالإضراب والتعويضات والتقاعد والعطل. وظهرت الأممية الأولى سنة 1864م والثانية سنة 1889م، وساهمت في اعتماد فاتح ماي عيدًا للعمال.

## 7- نتائج النضال العمالي

تحققت تدريجيًا مكتسبات منها:

- تقليص ساعات العمل والزيادة في الأجور.
- الاعتراف بالنقابات والإضراب.
- الحد من تشغيل الأطفال وتحسين وضع النساء.
- التعويض عن حوادث الشغل والمرض والبطالة.
- التقاعد والعطل المؤدى عنها.
- تمثيل العمال سياسيًا واجتماعيًا.

## خاتمة

رفعت التحولات الاقتصادية والمالية الإنتاج والمبادلات، وطورت النقل، ووسعت الأبناك والبورصات والشركات الكبرى، ونقلت الرأسمالية إلى مرحلتها المالية. كما غيرت المجتمع بارتفاع السكان ونمو المدن وصعود البورجوازية والطبقة العاملة. وأفرزت الفكر الاشتراكي والحركة النقابية، بينما مهد تراكم الأموال وفائض الإنتاج والتنافس إلى الإمبريالية والتوسع الاستعماري.`;

## مقدمة

عرفت الدول الرأسمالية خلال النصف الثاني من القرن 19م ومطلع القرن 20م تطورًا اقتصاديًا وصناعيًا وماليًا كبيرًا، نتج عنه تضخم الإنتاج وتراكم رؤوس الأموال واشتداد الحاجة إلى المواد الأولية والأسواق الخارجية ومجالات الاستثمار.

وأدى ذلك إلى احتدام التنافس الإمبريالي بين القوى الأوروبية حول المستعمرات ومناطق النفوذ، خاصة بعد ظهور قوى صناعية صاعدة مثل ألمانيا وإيطاليا، إلى جانب الولايات المتحدة الأمريكية واليابان، في مواجهة القوى الاستعمارية التقليدية وفي مقدمتها بريطانيا وفرنسا.

وازداد التنافس حدة بفعل تضارب المصالح الاقتصادية والسياسية، ونمو النزعات القومية، وتشكيل الأحلاف العسكرية، والسباق نحو التسلح، وتعدد الأزمات الدولية، خاصة في المغرب ومنطقة البلقان، مما أدى في النهاية إلى اندلاع الحرب العالمية الأولى سنة 1914م.

**فما مظاهر التنافس الإمبريالي؟ وما طبيعة الأحلاف التي تشكلت؟ وما مظاهر السباق نحو التسلح؟ وما أبرز الأزمات التي مهدت لاندلاع الحرب؟**

## 1- مظاهر التنافس الإمبريالي

### أ- التنافس الاقتصادي

اشتد التنافس نتيجة حاجة الدول الصناعية إلى:

- المواد الأولية مثل الفحم والحديد والنحاس والقطن والمطاط والنفط.
- أسواق جديدة لتصريف الإنتاج الصناعي.
- مجالات لاستثمار رؤوس الأموال.
- يد عاملة منخفضة التكلفة.
- أراض لاستقبال الفائض البشري.
- ممرات بحرية وقواعد استراتيجية.

كانت بريطانيا وفرنسا قوتين استعماريتين تقليديتين، غير أن ألمانيا وإيطاليا ظهرتا بعد تحقيق وحدتهما السياسية، كما برزت الولايات المتحدة واليابان. واعتبرت ألمانيا أن نصيبها من المستعمرات لا يتناسب مع قوتها، فطالبت بإعادة توزيع مناطق النفوذ.

### ب- التنافس السياسي والاستراتيجي

#### فرنسا وألمانيا

تركز الصراع حول الألزاس واللورين اللتين ضمتهما ألمانيا سنة 1871م، وحول المغرب والكونغو. ظلت فرنسا تطمح إلى استرجاع الإقليمين.

#### بريطانيا وألمانيا

خشيت بريطانيا من النمو الصناعي والبحري الألماني، وخاصة بناء أسطول يهدد سيادتها على البحار.

#### فرنسا وبريطانيا

تنافستا حول مصر والمغرب والسودان، وبلغ التوتر أزمة فاشودا سنة 1898م، لكن الخطر الألماني دفعهما إلى الاتفاق الودي سنة 1904م.

#### النمسا وصربيا وروسيا

طمحت صربيا إلى توحيد السلاف الجنوبيين، وخشيت النمسا تفكك إمبراطوريتها. دعمت روسيا صربيا، بينما دعمت ألمانيا النمسا، وتنافست روسيا والنمسا على البلقان وممتلكات الدولة العثمانية.

#### إيطاليا

سعت إلى استكمال وحدتها والتوسع في المتوسط وشمال إفريقيا، واحتلت ليبيا بعد الحرب مع الدولة العثمانية ما بين 1911 و1912م.

## 2- تكوين الأحلاف العسكرية

### أ- نظام بسمارك

عمل بسمارك على عزل فرنسا وتجنب حرب على جبهتين.

#### حلف الأباطرة الثلاثة سنة 1873م

ضم ألمانيا والنمسا والمجر وروسيا، لكنه ضعف بسبب التنافس في البلقان.

#### التحالف الثنائي سنة 1879م

ضم ألمانيا والنمسا والمجر ونص على المساعدة المتبادلة في حالة هجوم روسي.

#### التحالف الثلاثي سنة 1882م

ضم ألمانيا والنمسا والمجر وإيطاليا. غير أن إيطاليا اختلفت مع النمسا، فأعلنت الحياد سنة 1914م ثم انضمت إلى الحلفاء سنة 1915م.

### ب- نظام الأحلاف الفرنسي

#### التحالف الفرنسي الروسي

بدأ سنة 1891م وتعزز باتفاقية عسكرية سنة 1892م. خرجت فرنسا من عزلتها، واستفادت روسيا من رؤوس الأموال الفرنسية.

#### الاتفاق الفرنسي الإيطالي سنة 1902م

تعهدت إيطاليا بالحياد إذا اندلعت حرب بين فرنسا وألمانيا.

#### الاتفاق الودي الفرنسي البريطاني سنة 1904م

اعترفت بريطانيا بالنفوذ الفرنسي في المغرب مقابل اعتراف فرنسا بالنفوذ البريطاني في مصر.

#### الاتفاق البريطاني الروسي سنة 1907م

سوى خلافاتهما في آسيا، واكتمل الوفاق الثلاثي بين فرنسا وبريطانيا وروسيا.

### ج- انقسام أوروبا

انقسمت أوروبا إلى التحالف الثلاثي والوفاق الثلاثي، فأصبح كل نزاع محلي مهددًا بالتحول إلى حرب قارية بسبب التزامات الدفاع المتبادل.

## 3- السباق نحو التسلح

### أ- ارتفاع النفقات العسكرية

رفعت الدول ميزانيات الجيوش، وبنت البوارج والقواعد والتحصينات، وطورت المدفعية والرشاشات والغواصات والطائرات.

### ب- تزايد أعداد الجيوش

وسعت الخدمة العسكرية الإجبارية ومدة التجنيد، وأصدرت ألمانيا وفرنسا قوانين عسكرية سنة 1913م. أصبحت ألمانيا قوة برية كبرى، بينما حافظت بريطانيا على التفوق البحري.

### ج- السباق البحري البريطاني الألماني

بنت ألمانيا أسطولًا قويًا، وردت بريطانيا ببوارج دريدنوت الحديثة، فتحول السباق البحري إلى سبب مباشر للتوتر.

### د- الصناعات الحربية

تطورت المدافع والرشاشات والبنادق والغواصات والطائرات والبوارج والمتفجرات ووسائل الاتصال. أما الدبابات والغازات السامة فانتشر استعمالها خلال الحرب.

### هـ- التيارات الرافضة للحرب

عارضت الأحزاب الاشتراكية والنقابات الحرب وعدتها صراعًا بورجوازيًا على المستعمرات والأسواق، لكن هذه الحركات فشلت في منعها سنة 1914م.

## 4- المؤتمرات الدبلوماسية

### مؤتمر برلين سنة 1878م

عدل معاهدة سان ستيفانو، وقلص مكاسب روسيا، واعترف باستقلال صربيا ورومانيا والجبل الأسود، ووضع البوسنة والهرسك تحت إدارة النمسا، ومنح بريطانيا قبرص.

### مؤتمر مدريد سنة 1880م

ناقش الحماية القنصلية والامتيازات الأجنبية بالمغرب، وكرس التدخل الأوروبي.

### مؤتمر برلين 1884–1885م

نظم التنافس الاستعماري في إفريقيا، وأقر حرية الملاحة في الكونغو والنيجر ومبدأ الاحتلال الفعلي.

### مؤتمر الجزيرة الخضراء سنة 1906م

أكد رسميًا استقلال المغرب، لكنه منح فرنسا وإسبانيا دورًا في الشرطة والمؤسسات المالية، وكرس عزلة ألمانيا.

## 5- الأزمات المغربية

### الأزمة الأولى سنة 1905م

زار غيوم الثاني طنجة وأعلن تأييد استقلال المغرب، بهدف عرقلة النفوذ الفرنسي واختبار الاتفاق الفرنسي البريطاني. انتهت بمؤتمر الجزيرة الخضراء.

### الأزمة الثانية 1908–1909م

ارتبطت بحادث فرار جنود ألمان من الجيش الفرنسي في الدار البيضاء، وانتهت باتفاق اعترفت فيه ألمانيا بالمصالح السياسية الفرنسية مقابل الاعتراف بمصالحها الاقتصادية.

### أزمة أكادير سنة 1911م

أرسلت ألمانيا السفينة الحربية بانتير إلى أكادير بعد تدخل فرنسا في فاس. انتهت باعتراف ألمانيا بالنفوذ الفرنسي مقابل أراض في الكونغو، ومهدت لفرض الحماية على المغرب سنة 1912م.

## 6- الأزمات البلقانية

### أزمة البوسنة والهرسك 1908–1909م

ضمت النمسا الإقليمين، فغضبت صربيا وروسيا، لكن دعم ألمانيا للنمسا أجبر روسيا على التراجع.

### حرب البلقان الأولى 1912–1913م

شكلت صربيا وبلغاريا واليونان والجبل الأسود العصبة البلقانية وهزمت الدولة العثمانية وانتزعت معظم ممتلكاتها الأوروبية.

### حرب البلقان الثانية سنة 1913م

اندلع صراع حول مقدونيا، فهزمت بلغاريا وخرجت صربيا أقوى، مما زاد مخاوف النمسا.

## 7- اندلاع الحرب العالمية الأولى

### السبب المباشر

اغتيل ولي عهد النمسا فرانز فرديناند وزوجته في سراييفو يوم 28 يونيو 1914م على يد غافريلو برينسيب. قدمت النمسا إنذارًا إلى صربيا، ثم أعلنت عليها الحرب يوم 28 يوليوز.

### تفعيل الأحلاف

- أعلنت روسيا التعبئة لمساندة صربيا.
- أعلنت ألمانيا الحرب على روسيا يوم 1 غشت وعلى فرنسا يوم 3 غشت.

## مقدمة

خضع المشرق العربي للحكم العثماني عدة قرون، وعرف خلال أواخر القرن 18م وبداية القرن 19م ضعفًا سياسيًا واقتصاديًا وتراجعًا علميًا وثقافيًا. وفي المقابل، كانت أوروبا تعيش تحولات صناعية وعلمية وفكرية كبرى. وساهم الاحتكاك بها، والحملة الفرنسية على مصر، وإصلاحات محمد علي، وانتشار الطباعة والصحافة، وعودة أفراد البعثات الطلابية، في ظهور حركة فكرية وثقافية عرفت باسم اليقظة الفكرية أو النهضة العربية.

**فما المقصود باليقظة الفكرية؟ وما مظاهرها وعوامل ظهورها؟ وما أهم تياراتها وروادها ونتائجها؟**

## 1- مفهوم اليقظة الفكرية ومجالها

اليقظة الفكرية حركة ثقافية وفكرية وإصلاحية ظهرت في المشرق العربي خلال القرن 19م، خاصة في مصر وبلاد الشام، وسعت إلى إخراج المجتمعات العربية من الضعف والتأخر، وإحياء اللغة والتراث العربيين، وإصلاح التعليم والسياسة والمجتمع.

تركزت في مصر وبلاد الشام، كما نشط مفكرون عرب في إسطنبول وباريس ولندن، حيث صدرت صحف ومنابر إصلاحية.

## 2- مظاهر اليقظة الفكرية

### أ- انتشار الطباعة

أدخلت الحملة الفرنسية مطابع إلى مصر سنة 1798م، ثم أنشأ محمد علي مطبعة بولاق في عشرينيات القرن 19م. وساهمت المطابع في نشر الكتب المدرسية وإحياء المؤلفات القديمة وترجمة العلوم وتوسيع دائرة القراء وتشجيع التأليف والصحافة.

### ب- ظهور الصحافة

ظهرت صحف ومجلات مثل الوقائع المصرية وحديقة الأخبار والجنان والأهرام والعروة الوثقى. وناقشت قضايا الاستبداد والإصلاح والاستعمار والتعليم والمرأة واللغة العربية والقومية والوطنية، فتحولت الصحافة إلى مدرسة سياسية وفكرية.

### ج- نشاط الترجمة

نشطت الترجمة من الفرنسية والإنجليزية، وقادها خريجو البعثات، ومن أبرزهم رفاعة الطهطاوي. شملت الطب والهندسة والجغرافيا والتاريخ والقانون والفلسفة والأدب والعلوم، وأسهمت في إدخال مفاهيم مثل الحرية والمواطنة والدستور والمساواة.

### د- إحياء اللغة العربية والتراث

عمل المفكرون على تحقيق المخطوطات وتبسيط الكتابة وتأليف المعاجم والموسوعات وتجديد الأدب وتعريب المصطلحات العلمية. وبرع في ذلك بطرس البستاني وناصيف اليازجي وأحمد فارس الشدياق.

### هـ- المدارس والمعاهد الحديثة

أنشأ محمد علي مدارس الطب والهندسة والزراعة والإدارة واللغات والعلوم العسكرية، وأرسل بعثات إلى أوروبا. وفي بلاد الشام أسست مدارس ومعاهد وجمعيات ثقافية، فظهرت فئة من المثقفين والموظفين والأطباء والمهندسين والصحفيين.

### و- الجمعيات الثقافية والعلمية

تأسست جمعيات مثل الجمعية العلمية السورية، وناقشت الإصلاح السياسي وحقوق العرب وحماية اللغة ومقاومة التتريك ونشر التعليم والتضامن بين سكان المشرق.

### ز- الاهتمام بتعليم المرأة

دعا مفكرون إلى تعليم الفتيات وإصلاح تربية المرأة ومشاركتها الاجتماعية، واعتبروا تعليمها شرطًا لتقدم الأسرة والمجتمع. ومن أبرزهم قاسم أمين وبطرس البستاني ورفاعة الطهطاوي.

## 3- عوامل ظهور اليقظة الفكرية

### أ- العوامل السياسية

#### الحملة الفرنسية على مصر

كشفت الحملة سنة 1798م ضعف الدولة العثمانية والتفوق العسكري والعلمي الأوروبي وأهمية الطباعة والتنظيم الحديث، فشكلت صدمة دفعت إلى التفكير في الإصلاح.

#### ضعف الدولة العثمانية

تجلى في ضعف الجيش والفساد وخسارة الأقاليم وتزايد التدخل الأوروبي وعجزها عن حماية البلاد العربية، فظهرت دعوات إلى إصلاح الدولة أو إقامة أنظمة دستورية.

#### سياسة التتريك

أثارت محاولة فرض اللغة والثقافة التركيتين استياء المثقفين العرب، فطالبوا بالاعتراف بالعربية والمساواة واللامركزية، وساهم ذلك في نمو الشعور القومي العربي.

#### تصاعد التدخل الاستعماري

احتلت فرنسا الجزائر سنة 1830م، وبريطانيا عدن سنة 1839م، وفرنسا تونس سنة 1881م، وبريطانيا مصر سنة 1882م، فدعا المفكرون إلى الإصلاح والوحدة والمقاومة.

### ب- إصلاحات محمد علي

شملت بناء جيش حديث، وإنشاء المدارس والمصانع، وإرسال البعثات، واستقدام الخبراء، وتنظيم الإدارة، وإنشاء مطبعة بولاق، وتشجيع الترجمة. وأدت إلى ظهور نخبة مثقفة حديثة.

### ج- العوامل الاجتماعية

ظهرت طبقة وسطى من الموظفين والمدرسين والأطباء والمهندسين والصحفيين والتجار والمحامين والمترجمين، وحملت أفكار الإصلاح. كما ساعد نمو المدن على خلق فضاءات جديدة للتواصل الثقافي.

### د- العوامل الثقافية

تمثلت في المطابع والصحافة والترجمة وإحياء التراث والمدارس الحديثة والبعثات والجمعيات والمكتبات والتأليف، وأدى التفاعل بين التراث والفكر الأوروبي إلى مشاريع إصلاحية متعددة.

### هـ- دور الإرساليات والمدارس الأجنبية

ساهمت في تعليم اللغات والعلوم وتطوير الطباعة وتعليم الفتيات، لكنها ارتبطت أحيانًا بأهداف دينية وسياسية، مما شجع على إنشاء مدارس وطنية وعربية.

## 4- التيارات الفكرية

### أ- التيار الإصلاحي السلفي

دعا إلى العودة إلى الأصول الصحيحة للدين وتنقية المجتمع من البدع والخرافات وفتح باب الاجتهاد والاستفادة من العلوم الحديثة.

#### أفكاره الدينية

- العودة إلى القرآن والسنة.
- فتح باب الاجتهاد ورفض التقليد الأعمى.
- التوفيق بين الدين والعلم.
- إصلاح التعليم الديني.

#### أفكاره السياسية

- محاربة الاستبداد واعتماد الشورى.
- إقامة نظام دستوري ومراقبة الحاكم.
- الوحدة بين المسلمين ومقاومة الاستعمار.
- إصلاح مؤسسات الدولة وتحقيق العدالة.

#### أفكاره الاجتماعية

- نشر التعليم ومحاربة الجهل.
- تحسين وضع المرأة.
- نبذ التعصب المذهبي والطائفي.
- إصلاح الأسرة والمجتمع.

ومن رواده جمال الدين الأفغاني ومحمد عبده وعبد الرحمن الكواكبي.

### ب- التيار الليبرالي

تأثر بالفكر الأوروبي الحديث، خاصة الحرية والمساواة والدستور والمواطنة، ودعا إلى تحديث الدولة والمجتمع والتعليم.

#### أفكاره السياسية

- إقامة نظام دستوري والفصل بين السلطات.
- تقييد سلطة الحاكم واحترام القانون.
- ضمان الحريات والتمثيل النيابي.
- رفض الاستبداد وبناء دولة حديثة.

#### أفكاره الاجتماعية والثقافية

- تعميم التعليم وتعليم المرأة.
- نبذ التعصب الطائفي والتمييز.
- نشر الفكر العقلاني وترجمة العلوم.
- إحياء العربية والاستفادة من التجربة الأوروبية.

ومن رواده رفاعة الطهطاوي وبطرس البستاني وقاسم أمين وأديب إسحاق وفرانسيس مراش.

## 5- رواد التيار الإصلاحي

### جمال الدين الأفغاني

ولد سنة 1838م أو 1839م، وتنقل بين بلدان متعددة. دعا إلى وحدة المسلمين ومقاومة الاستعمار ومحاربة الاستبداد والاستفادة من العلوم الحديثة وإصلاح التعليم. أصدر مع محمد عبده صحيفة العروة الوثقى سنة 1884م، وتوفي سنة 1897م.

### محمد عبده

ولد سنة 1849م، ودرس بالأزهر وتأثر بالأفغاني، وساند الثورة العرابية ثم نفي. تولى الإفتاء، ودعا إلى إصلاح الأزهر والجمع بين العلوم الدينية والحديثة وفتح باب الاجتهاد ومحاربة الخرافات والتعصب. توفي سنة 1905م.

### عبد الرحمن الكواكبي

ولد في حلب سنة 1855م، وعرف بمعارضته للاستبداد العثماني. دعا إلى الشورى ومراقبة الحاكم ونشر التعليم ونهضة العرب. ومن أشهر كتبه طبائع الاستبداد وأم القرى. توفي سنة 1902م.

## 6- رواد التيار الليبرالي

### رفاعة الطهطاوي

ولد سنة 1801م، ورافق بعثة إلى باريس، وتعلم الفرنسية واطلع على المؤسسات الأوروبية. دعا إلى تطوير التعليم والترجمة وحب الوطن والمساواة وتعليم المرأة وتحديث الإدارة. ساهم في تأسيس مدرسة الألسن، وتوفي سنة 1873م.

### بطرس البستاني

ولد سنة 1819م، ودعا إلى التعليم والوحدة الوطنية ونبذ التعصب وتعليم الفتيات وتطوير اللغة العربية. أسس المدرسة الوطنية وأصدر نفير سورية وساهم في المعاجم والموسوعات. توفي سنة 1883م.

### قاسم أمين

ولد سنة 1863م، واشتهر بالدعوة إلى تعليم المرأة وإصلاح الأسرة وربط نهضة الأمة بنهضة المرأة. من مؤلفاته تحرير المرأة والمرأة الجديدة، وتوفي سنة 1908م.

### أديب إسحاق

ولد سنة 1856م، وعمل بالصحافة، ودعا إلى الحرية والمساواة والحكم الدستوري وحرية الصحافة ومقاومة الاستبداد، وتوفي سنة 1885م.

### فرانسيس مراش

ولد سنة 1836م، ودافع عن الحرية والمساواة والعدالة والتعليم ونبذ الطائفية وتنظيم الدولة على أسس حديثة، وتوفي سنة 1873م.

## 7- القواسم المشتركة والاختلافات

اختلف التيار الإصلاحي والتيار الليبرالي في المنطلقات؛ جعل الأول الدين أساس مشروعه، بينما ركز الثاني على الاستفادة من التجربة الأوروبية. لكنهما اتفقا على محاربة الاستبداد ونشر التعليم وإصلاح المجتمع وتحسين وضع المرأة وتحديث الإدارة وتحقيق الحرية والمساواة ومواجهة التدخل الاستعماري وإحياء اللغة العربية.

## 8- نتائج اليقظة الفكرية

### إحياء اللغة والثقافة العربيتين

تحقيق المخطوطات وتطوير العربية وظهور الصحافة وتجديد الأدب ونشر المعاجم والموسوعات وترجمة العلوم.

### انتشار التعليم

تأسيس مدارس حديثة وإرسال بعثات وزيادة المتعلمين والمطالبة بتعليم المرأة والجمع بين التعليم الديني والعلوم العصرية.

### نمو الوعي السياسي

انتشرت مفاهيم الدستور والمواطنة والحرية والمساواة والشورى والتمثيل النيابي وسيادة القانون.

### مواجهة الاستبداد

تصاعدت الدعوة إلى تقييد سلطة الحاكم وإنشاء المجالس النيابية وضمان الحريات ومحاسبة المسؤولين.

### ظهور القومية العربية والوطنية

ساهم إحياء العربية ومقاومة التتريك في نمو الشعور القومي، كما ظهر شعور وطني مرتبط بمصر وسورية ولبنان، ودعا إلى وحدة أبناء الوطن رغم اختلاف الأديان.

### مقاومة الاستعمار

رفعت الصحافة والجمعيات الوعي بخطورة الاحتلال، ودعت إلى الوحدة وبناء جيش قوي وتطوير التعليم والصناعة وإصلاح الدولة.

### التسامح وإصلاح وضع المرأة

انتشرت الدعوة إلى التعايش بين الطوائف وتعليم الفتيات وظهرت كاتبات وصحفيات، وأصبحت قضية المرأة جزءًا من مشروع النهضة.

## 1- الضغوط العسكرية الفرنسية

### معركة إيسلي سنة 1844م

ساند المغرب مقاومة الأمير عبد القادر الجزائري ضد فرنسا، فاعتبرت فرنسا ذلك تهديدًا لاحتلالها للجزائر. وقعت معركة إيسلي قرب وجدة يوم 14 غشت 1844م، وانتهت بهزيمة الجيش المغربي بسبب التفوق التقني والتنظيمي الفرنسي وضعف التدريب والقيادة المغربية. كما قصفت البحرية الفرنسية طنجة والصويرة.

### معاهدة طنجة سنة 1844م

التزم المغرب بوقف مساندة الأمير عبد القادر والتعاون مع فرنسا لضبط الحدود.

### معاهدة لالة مغنية سنة 1845م

ثبتت الحدود الشمالية وتركت الحدود الجنوبية غامضة، فاستغلت فرنسا هذا الغموض لاحقًا للتوسع في الصحراء الشرقية المغربية.

## 2- الضغوط الإسبانية وحرب تطوان

### أسباب الحرب

سعت إسبانيا إلى توسيع حدود سبتة ومليلية، ووقعت مواجهات مع قبائل أنجرة. واستغلت ضعف المغرب وأعلنت الحرب سنة 1859م.

### احتلال تطوان سنة 1860م

تقدمت القوات الإسبانية واحتلت تطوان في فبراير 1860م، وكشفت الحرب ضعف الجيش المغربي أمام الأسلحة الحديثة.

### معاهدة واد راس سنة 1860م

فرضت إسبانيا:

- توسيع حدود سبتة.
- الاعتراف بحقوقها في مركز ساحلي جنوب المغرب.
- دفع غرامة تقارب عشرين مليون ريال إسباني.
- بقاء تطوان محتلة إلى حين الأداء.
- تخصيص جزء من مداخيل المراسي للتعويضات.

واضطر المغرب إلى الاقتراض ورهن جزء من مداخيل المراسي، فتزايدت تبعيته المالية.

## 3- الضغوط التجارية وفرض الانفتاح

### سياسة الاحتراز

اعتمد المغرب سابقًا سياسة تراقب التجارة الخارجية وتحمي الحرف والمنتجات المحلية وتضمن مداخيل الرسوم الجمركية، لكن الدول الأوروبية ضغطت لفتح الأسواق.

### الاتفاقية المغربية البريطانية سنة 1856م

فتحت السوق أمام المنتجات البريطانية، وخفضت الرسوم الجمركية، وسمحت للتجار البريطانيين بالإقامة واستئجار العقارات والاستفادة من الحماية. أدى تدفق السلع المصنوعة آليًا إلى تضرر الحرفيين وتراجع مداخيل الدولة.

### الاتفاقية المغربية الإسبانية سنة 1861م

منحت إسبانيا امتيازات مشابهة من حرية التجارة وتخفيض الرسوم والحماية القنصلية وتسهيلات الموانئ.

### اتفاقية بيكلار مع فرنسا سنة 1863م

نظمت الحماية القنصلية وسمحت للتجار والقناصل الفرنسيين باتخاذ مساعدين وسماسرة مغاربة محميين، فتوسع عدد المحميين وأصبحوا معفيين من بعض الضرائب وغير خاضعين كاملًا للقضاء المغربي.

## 4- الضغوط الدبلوماسية والحماية القنصلية

### مفهوم الحماية القنصلية

امتياز تمنحه القنصليات لبعض الرعايا أو العاملين معها، فيستفيد المحمي من الإعفاءات واللجوء إلى القنصلية والحماية من السلطات المحلية.

### أضرار الحماية

- تراجع سيادة الدولة وضعف القضاء المغربي.
- انخفاض المداخيل الجبائية.
- تزايد تدخل القناصل.
- ارتباط الأعيان والتجار بالمصالح الأجنبية.
- انتشار التهرب الضريبي.
- إضعاف هيبة المخزن.

### مؤتمر مدريد سنة 1880م

حاول المولى الحسن الأول تقليص الحماية، لكن المؤتمر أقر استمرارها ووسع امتيازات الأجانب وحق التملك والتجارة، فكرس التدخل الأجنبي بدل الحد منه.

## 5- التغلغل الاستعماري في الجنوب والصحراء

### أهمية الصحراء

ترتبط بطرق القوافل والتجارة مع إفريقيا جنوب الصحراء والساحل الأطلسي وقرب جزر الكناري، وكانت قبائلها تربطها بالسلطان روابط البيعة.

### التحركات البريطانية في طرفاية

أقام دونالد ماكنزي سنة 1879م مركزًا تجاريًا باسم شركة شمال غرب إفريقيا، وسعى إلى احتكار تجارة القوافل. قاوم المولى الحسن الأول المشروع إلى أن استرجع المغرب المركز.

### التوسع الإسباني

أعلنت إسبانيا سنة 1884م نفوذها على أجزاء من وادي الذهب وأقامت مراكز استعمارية، وطالبت بإفني استنادًا إلى معاهدة واد راس. غير أن الاحتلال الفعلي لإفني وقع سنة 1934م.

### التوسع الفرنسي من الجزائر

احتلت فرنسا توات وتيديكلت وكورارة مستفيدة من غموض الحدود الذي تركته معاهدة لالة مغنية.

### رد فعل المولى الحسن الأول

قام بحركات سلطانية لتجديد البيعة وتأكيد سلطة المخزن وتعيين القواد وجمع الضرائب ومواجهة التدخل الأجنبي، كما شجع المراسي والمبادلات الوطنية.

## 6- محاولات الإصلاح العسكري

### إنشاء جيش نظامي

حاول السلاطين بناء جيش حديث يقوم على التجنيد المنتظم والتدريب والزي الموحد والرتب والانضباط بدل الاعتماد الكامل على جيش البخاري وقبائل الكيش.

### البعثات العسكرية والمدربون

أرسل الطلبة والضباط إلى أوروبا لتعلم الهندسة والمدفعية وصناعة الأسلحة والملاحة، واستقدم ضباط أوروبيون لتدريب الجنود.

### شراء الأسلحة وإنشاء المصانع

اشترى المغرب الأسلحة والذخائر وأنشأ ورشًا في فاس ومراكش ومكناس لصناعة وإصلاح الأسلحة والبارود، لكن بعض المعدات كانت قديمة ورديئة رغم ارتفاع الثمن.

### محاولة إنشاء أسطول

اقتنى المغرب سفنًا مثل الحسني والبشير والتركي لحماية السواحل ونقل الجنود، لكن الأسطول ظل محدودًا أمام الأساطيل الأوروبية.

## 7- الإصلاحات الاقتصادية

### إنشاء المعامل

أنشئت معامل للأسلحة والورق والزجاج والسكر والنسيج والبارود، واستوردت آلات وخبراء، لكنها ظلت محدودة ولم تتحول إلى تصنيع شامل.

### تطوير الفلاحة

شجعت زراعة القطن وقصب السكر وبعض المنتجات الموجهة للتصدير، وتحسين الري والأدوات، لكن الفلاحة ظلت تقليدية ومتأثرة بالجفاف والجراد والأوبئة.

### المعادن والموانئ والطرق

اهتم المخزن بالفحم والمعادن واستقدم خبراء، وأصلح المراسي والطرق والقناطر وموانئ طنجة والصويرة والدار البيضاء، لكن التجارة الخارجية أصبحت تدريجيًا تحت هيمنة الأجانب.

## 8- الإصلاحات الإدارية

### الإدارة المركزية

طورت مناصب مثل الصدر الأعظم ووزير الشؤون البرانية ووزير الحرب ووزير المالية والأمناء، بهدف توزيع الاختصاصات وتنظيم الدولة.

### الإدارة المحلية

قسمت بعض القيادات الكبرى وعين العمال والقواد، وحاول المخزن مراقبتهم وتقوية السلطة المركزية، لكن اتساع البلاد وضعف الاتصال حدّا من الفعالية.

### إدارة المراسي

عين أمناء لتحصيل الرسوم ومراقبة التجارة ومنع التهريب وتحويل المداخيل إلى الخزينة، ورفعت أجور بعضهم للحد من الرشوة.

## 9- الإصلاحات المالية والجبائية

### تنظيم المالية

نظمت الحسابات ومداخيل المراسي والقبائل والأملاك المخزنية، وظهر منصب مول الشكارة في بعض الفترات.

### الضرائب الجديدة

فرضت مكوس الأسواق والأبواب والحافر وضريبة الترتيب لتمويل الجيش والإدارة والديون، لكنها واجهت مقاومة القبائل والعلماء والأعيان.

### الاقتراض الخارجي

استعمل لأداء التعويضات وشراء الأسلحة وتمويل بعض الإصلاحات، لكنه ارتبط بفوائد وضمانات من مداخيل الموانئ، فزادت التبعية المالية.

## 10- الإصلاحات النقدية

حاول المخزن مواجهة تعدد العملات وتراجع العملة المغربية والتزوير والتهريب عبر سك عملة جديدة وضبط الصرف ومحاربة التزوير، لكن ضعف الاقتصاد والعجز التجاري حالا دون الاستقرار.

## 11- إصلاح التعليم

أنشئت مدارس للحساب والهندسة والجغرافيا واللغات والفلك والعلوم العسكرية والكيمياء والملاحة، وأرسلت بعثات إلى أوروبا. كما شجعت العلوم الحديثة داخل التعليم التقليدي، لكن عدد المستفيدين ظل محدودًا ولم يحدث إصلاح شامل للمناهج.

## 12- عوامل فشل الإصلاحات

### أ- عوامل خارجية

- الضغوط الاستعمارية والاتفاقيات غير المتكافئة.
- التفوق الصناعي والعسكري الأوروبي.
- الحماية القنصلية والتدخل في الشؤون الداخلية.
- الديون ورهن الموارد.
- بيع معدات قديمة ومرتفعة الثمن.
- عدم رغبة القوى الأوروبية في قيام مغرب قوي.

### ب- عوامل داخلية

- معارضة بعض العلماء والفئات المحافظة والقواد والأعيان.
- ضعف الإدارة والموظفين والمراقبة.
- محدودية الموارد المالية.
- ضعف البنية الاقتصادية والفلاحة التقليدية.
- مقاومة القبائل للضرائب.
- الجفاف والمجاعات والجراد والأوبئة.
- غياب مشروع إصلاحي شامل ومستمر ونخبة تقنية واسعة.

## 13- نتائج فشل الإصلاحات

أدى الفشل إلى ارتفاع الديون وتراجع السيادة المالية واستمرار الحماية وضعف الجيش وهيمنة الأجانب على التجارة وتزايد التنافس الفرنسي والإسباني والألماني والاضطرابات الداخلية، وانتهى الأمر بتوقيع معاهدة فاس وفرض الحماية سنة 1912م.

## خاتمة

تعرض المغرب لضغوط عسكرية وتجارية ودبلوماسية ومالية كشفتها هزيمتا إيسلي وتطوان وكرستها الاتفاقيات والحماية القنصلية ومؤتمر مدريد. وحاول السلاطين إصلاح الجيش والاقتصاد والإدارة والمالية والتعليم، لكن الإصلاحات ظلت جزئية وواجهت عراقيل داخلية وضغوطًا خارجية وتفوقًا أوروبيًا كبيرًا، فانتهت الأزمة بفرض الحماية الفرنسية والإسبانية سنة 1912م.`;

## مقدمة

انتهت الحرب العالمية الأولى سنة 1918م بعد أربع سنوات من المواجهات العنيفة، مخلفة خسائر بشرية ومادية واقتصادية غير مسبوقة، خاصة في أوروبا. وحاولت الدول المنتصرة إعادة تنظيم القارة من خلال مؤتمر السلم ومعاهدات الصلح، إلا أن الشروط القاسية المفروضة على المنهزمين، وخاصة ألمانيا، خلقت توترات جديدة.

كما عرفت أوروبا تحولات سياسية مهمة، من أبرزها الثورة البلشفية وظهور الاتحاد السوفياتي، واضطرابات فرنسا وإيطاليا وألمانيا. ثم جاءت أزمة 1929م لتعمق اختلالات النظام الرأسمالي وتمهد لصعود الأنظمة الديكتاتورية.

**فما حصيلة الحرب العالمية الأولى؟ وكيف أعيد تنظيم أوروبا؟ وما أهم التحولات السياسية؟ وما أسباب أزمة 1929م ومظاهرها ونتائجها؟**

## 1- الحصيلة البشرية والاقتصادية والاجتماعية للحرب

### أ- الخسائر البشرية

خلفت الحرب ملايين القتلى والجرحى والمعطوبين والمفقودين، وسقط مدنيون بسبب القصف والمجاعات والأوبئة. وكانت ألمانيا وفرنسا وروسيا والنمسا وبريطانيا وإيطاليا وصربيا من أكثر الدول تضررًا.

وأثرت الخسائر في البنية الديموغرافية: تراجع عدد الرجال، وارتفعت نسبة النساء والأطفال والشيوخ، وتزايد عدد الأرامل واليتامى والمعطوبين، وانخفضت الولادات ونقصت اليد العاملة.

### ب- الأوبئة والمجاعات

أدى تراجع الإنتاج وصعوبة النقل والحصار ونقص الأدوية إلى سوء التغذية وانتشار الأمراض، وزادت جائحة الإنفلونزا 1918–1919م من حجم الكارثة.

### ج- الخسائر المادية

دمرت المدن والقرى والمصانع والمناجم والمزارع والسكك والطرق والجسور والموانئ وشبكات الاتصال، خاصة في شمال فرنسا وبلجيكا وأوروبا الشرقية والبلقان.

### د- تراجع الإنتاج والديون

وجه الاقتصاد نحو الحرب ثم وجد صعوبة في العودة إلى الإنتاج المدني. انخفض الإنتاج الفلاحي والصناعي والتجارة، وفقدت أوروبا جزءًا من أسواقها لمصلحة الولايات المتحدة واليابان. كما لجأت الدول إلى الضرائب وإصدار النقود والاقتراض، وأصبحت الولايات المتحدة أكبر دائن.

### هـ- التضخم والنتائج الاجتماعية

أدى إصدار النقود إلى انخفاض العملات وارتفاع الأسعار وتراجع القدرة الشرائية والمدخرات، وبلغ التضخم حدًا شديدًا في ألمانيا سنة 1923م. وانتشر الفقر والبطالة والإضرابات والاحتجاجات، واتسع عمل النساء خلال الحرب وتطورت المطالبة بحقوقهن.

## 2- الحصيلة السياسية

### انهيار الإمبراطوريات

سقطت الإمبراطوريات الألمانية والنمساوية المجرية والعثمانية والروسية، وظهرت جمهوريات ودول قومية جديدة.

### تغير ميزان القوى

ضعفت أوروبا، بينما خرجت الولايات المتحدة بصناعة قوية واحتياطات مالية وذهبية وبمكانة أكبر دائن، كما توسع نفوذ اليابان في آسيا.

## 3- مؤتمر السلم ومبادئ ويلسون

افتتح مؤتمر باريس سنة 1919م، وقاد قراراته ويلسون وكليمنصو ولويد جورج وأورلاندو. أرادت فرنسا إضعاف ألمانيا، بينما فضلت بريطانيا الحفاظ على التوازن، ودعا ويلسون إلى حق تقرير المصير وحرية الملاحة وتخفيض التسلح وإنشاء منظمة دولية.

لكن مبادئ ويلسون طبقت انتقائيًا، ولم تحصل الشعوب المستعمرة على الاستقلال، بل فرض نظام الانتداب على مناطق عربية.

## 4- معاهدات الصلح

### معاهدة فرساي مع ألمانيا

- أعادت الألزاس واللورين إلى فرنسا.
- اقتطعت أراض لصالح بلجيكا والدنمارك وبولونيا.
- أنشئ الممر البولوني ووضعت دانتسيغ تحت إشراف عصبة الأمم.
- وضعت السار تحت إشراف دولي واستغلت فرنسا مناجمها.
- جردت ألمانيا من المستعمرات.
- حدد جيشها في مائة ألف جندي ومنعت من الطائرات والدبابات والغواصات.
- نزعت سلاح الراين ومنعت من الاتحاد مع النمسا.
- حملت مسؤولية الحرب وفرضت عليها تعويضات قدرها 132 مليار مارك ذهبي.

### معاهدة سان جرمان مع النمسا

فككت الإمبراطورية النمساوية المجرية، واعترفت باستقلال هنغاريا وتشيكوسلوفاكيا ويوغوسلافيا، وقلصت النمسا ومنعت اتحادها مع ألمانيا.

### معاهدة نويي مع بلغاريا

اقتطعت أراض منها، وفقدت منفذها على بحر إيجة، وقلص جيشها وفرضت عليها تعويضات.

### معاهدة تريانون مع هنغاريا

فقدت جزءًا كبيرًا من أراضيها وسكانها لصالح رومانيا وتشيكوسلوفاكيا ويوغوسلافيا، فظهرت أقليات هنغارية خارج حدودها.

### معاهدة سيفر مع الدولة العثمانية

فقدت معظم أراضيها العربية ووضعت مناطق تحت الانتداب، لكن الحركة الوطنية التركية رفضتها، فاستبدلت بمعاهدة لوزان سنة 1923م التي اعترفت بالدولة التركية الحديثة.

## 5- تغير الخريطة السياسية وإنشاء عصبة الأمم

ظهرت بولونيا وتشيكوسلوفاكيا ويوغوسلافيا وفنلندا وإستونيا ولاتفيا وليتوانيا، لكن الأقليات القومية بقيت مصدر توتر.

أنشئت عصبة الأمم سنة 1920م بجنيف لحفظ السلم وحل النزاعات، وتكونت من الجمعية العامة ومجلس العصبة والأمانة ومحكمة العدل. غير أنها ضعفت بسبب غياب الولايات المتحدة والجيش الدولي واعتمادها على الدول الكبرى والإجماع.

## 6- الثورة الروسية وتأسيس الاتحاد السوفياتي

### أوضاع روسيا قبل الثورة

حكم قيصري استبدادي، تخلف فلاحي وصناعي، فقر وأمية وتعدد قوميات، وساءت الأوضاع بسبب الحرب ونقص الغذاء وارتفاع الأسعار والخسائر العسكرية.

### ثورة فبراير 1917م

اندلعت مظاهرات وإضرابات وانضم الجنود، فتنازل القيصر وتشكلت حكومة مؤقتة وظهرت السوفياتات، لكن الحكومة واصلت الحرب ولم تحل مشكلتي الأرض والغذاء.

### ثورة أكتوبر

قاد البلاشفة بزعامة لينين الثورة تحت شعارات السلام والأرض والخبز وكل السلطة للسوفياتات، وأسقطوا الحكومة المؤقتة.

### التدابير البلشفية

- مرسوم السلام والخروج من الحرب بمعاهدة بريست ليتوفسك.
- مصادرة أراضي كبار الملاك والكنيسة.
- تأميم الأبناك والمصانع الكبرى والنقل والتجارة الخارجية.
- الاعتراف بحق القوميات في تقرير المصير.

### الحرب الأهلية والاتحاد السوفياتي

اندلعت حرب بين الجيش الأحمر والجيوش البيضاء المدعومة أجنبيًا، وانتهت بانتصار البلاشفة. تأسس الاتحاد السوفياتي سنة 1922م. وبعد وفاة لينين صعد ستالين واعتمد التصاميم الخماسية والتصنيع والتجميع الزراعي، مع استعمال العنف والقمع والمصادرات.

## 7- فرنسا بعد الحرب

عانت فرنسا دمار الشمال والديون والتضخم ونقص اليد العاملة، واعتمدت على التعويضات الألمانية، واحتلت الرور سنة 1923م عند تأخر الأداء. اجتماعيًا ارتفعت الأسعار والإضرابات واستقدمت عمالًا أجانب ومن المستعمرات. سياسيًا تعددت الحكومات وتصاعد الخوف من الشيوعية وألمانيا، لكن الجمهورية استمرت.

## 8- إيطاليا وصعود الفاشية

شعرت إيطاليا بالنصر المبتور، وعانت الديون والتضخم والبطالة والإضرابات واحتلال المصانع والأراضي. استغل موسوليني خوف البورجوازية من الشيوعية وغضب الجنود وضعف الحكومات، وأنشأ القمصان السوداء، ثم وصل إلى الحكم بعد مسيرة روما سنة 1922م وأقام دولة شمولية ألغت الحريات وقمعت المعارضة.

## 9- ألمانيا وصعود النازية

### جمهورية فيمار

قامت سنة 1919م كنظام ديمقراطي، لكنها واجهت الشيوعيين والقوميين والملكيين والنازيين ومحاولات الانقلاب.

### الأزمة الاقتصادية والتضخم

أثقلت التعويضات الاقتصاد. وعند احتلال الرور سنة 1923م طبعت الحكومة النقود لدعم المقاومة السلبية، فانهارت قيمة المارك والمدخرات وتضررت الطبقة الوسطى.

### الاستقرار المؤقت

استفادت ألمانيا من القروض الأمريكية وخطة دوز منذ سنة 1924م، فاستقرت العملة وتحسن الإنتاج، لكن الاستقرار ظل هشًا بسبب الاعتماد على المال الأمريكي.

### الحزب النازي

استغل رفض فرساي والإهانة والخوف من الشيوعية والبطالة وضعف الحكومات، وتوسع نفوذه بقوة بعد أزمة 1929م.

## 10- أسباب أزمة 1929م

### فائض الإنتاج

ارتفع الإنتاج الصناعي والفلاحي الأمريكي بفضل الآلات والإنتاج المتسلسل والقروض، لكن القدرة الشرائية لم ترتفع بالوتيرة نفسها، فتراكمت السلع وانخفضت الأسعار والأرباح.

### الأزمة الفلاحية

وسع الفلاحون الإنتاج خلال الحرب واقترضوا، ثم انخفض الطلب والأسعار بعد عودة الإنتاج الأوروبي، فعجزوا عن تسديد الديون وصودرت ضيعاتهم.

### المضاربة في البورصة

ارتفعت أسعار الأسهم بصورة مصطنعة، واشترى المستثمرون بالقروض بقصد البيع السريع، فانفصلت الأسعار عن القيمة الحقيقية للشركات.

### التوسع في القروض وضعف القدرة الشرائية

انتشر الاقتراض للاستهلاك وشراء الأسهم، بينما تركزت الثروة في يد فئة محدودة، فظهر تناقض بين الإنتاج والاستهلاك.

### ضعف النظام البنكي

استثمرت أبناك صغيرة أموال المودعين في المضاربة ومنحت قروضًا دون ضمانات، فأصبحت هشة أمام الانهيار.

## 11- اندلاع الأزمة وانتشارها

انهارت الأسهم في الخميس الأسود 24 أكتوبر 1929م ثم الثلاثاء الأسود 29 أكتوبر. أدى ذلك إلى إفلاس المضاربين والأبناك وتراجع الاستثمار وإغلاق المؤسسات والبطالة.

انتقلت الأزمة من المال إلى الصناعة والفلاحة، ثم إلى أوروبا عندما سحبت الأبناك الأمريكية قروضها، خاصة من ألمانيا والنمسا، وامتدت إلى بريطانيا وفرنسا وإيطاليا وأوروبا الشرقية والمستعمرات.

تضررت المستعمرات بانخفاض الطلب وأسعار القطن والمطاط والسكر والبن والمعادن والحبوب. أما الاتحاد السوفياتي فكان أقل ارتباطًا بالبورصات العالمية بسبب الاقتصاد المخطط.

## 12- مظاهر ونتائج الأزمة

### المظاهر الاقتصادية والاجتماعية

- انهيار الأسهم والأبناك والعملات.

- تراكم السلع وانخفاض الأسعار.
- ارتفاع البطالة والفقر والتشرد وسوء التغذية.
- تزايد الإضرابات وفقدان الثقة في النظام.

### النتائج السياسية

- صعود الأحزاب المتطرفة والفاشية والنازية.
- وصول هتلر إلى الحكم سنة 1933م.
- الحمائية والقومية الاقتصادية وتراجع التعاون الدولي.
- ازدياد التنافس على الأسواق والمواد الأولية.
- اتجاه دول نحو التوسع الخارجي والتسلح.

## 13- مواجهة الأزمة

### الولايات المتحدة والصفقة الجديدة

طبق روزفلت منذ سنة 1933م الصفقة الجديدة: مراقبة الأبناك وضمان الودائع ودعم الفلاحين وتنظيم الإنتاج والأشغال الكبرى وتشغيل العاطلين والقوانين الاجتماعية والحقوق النقابية.

### بريطانيا وفرنسا

تخلتا تدريجيًا عن قاعدة الذهب، وخفضتا العملة وحمتا الأسواق ودعمتا قطاعات اقتصادية واعتمدتا على المستعمرات.

### ألمانيا وإيطاليا واليابان

اعتمدت الاقتصاد الموجه والأشغال الكبرى والتسلح والصناعات الحربية والسعي إلى الاكتفاء الذاتي والتوسع الترابي.

## مقدمة

لم تؤد نهاية الحرب العالمية الأولى إلى سلام دائم، بل خلفت معاهدات الصلح، وفي مقدمتها معاهدة فرساي، توترات جديدة داخل أوروبا. وشعرت ألمانيا بالإهانة بسبب الشروط القاسية، بينما واجهت إيطاليا واليابان صعوبات اقتصادية وطموحات توسعية.

وزادت أزمة 1929م من حدة الأوضاع الاقتصادية والاجتماعية، فارتفعت البطالة وانتشرت النزعات القومية المتطرفة، ووصلت أنظمة ديكتاتورية إلى الحكم في ألمانيا وإيطاليا واليابان. وانتهجت هذه الدول سياسة توسعية في وقت عجزت فيه عصبة الأمم والدول الديمقراطية عن وقفها.

اندلعت الحرب سنة 1939م وتحولت إلى حرب شاملة، وانتهت سنة 1945م بعد خسائر ضخمة وتحولات سياسية عميقة.

## 1- أسباب اندلاع الحرب العالمية الثانية

### أ- مخلفات الحرب العالمية الأولى ومعاهدة فرساي

فرضت على ألمانيا خسائر ترابية وعسكرية ومالية:

- فقدان الألزاس واللورين وأراض لصالح بولونيا وبلجيكا والدنمارك.
- فقدان المستعمرات ووضع السار تحت إشراف دولي.
- تحديد الجيش في مائة ألف جندي وإلغاء الخدمة الإجبارية.
- منع الدبابات والطائرات والغواصات ونزع سلاح الراين.
- تحميل ألمانيا مسؤولية الحرب وفرض تعويضات ضخمة.

أدى ذلك إلى التضخم والفقر وتضرر الطبقة الوسطى والشعور بالإهانة والرغبة في الانتقام، واستغل الحزب النازي هذه الأوضاع ووعد بإلغاء فرساي واستعادة القوة.

### ب- عدم رضا إيطاليا

لم تحصل إيطاليا على جميع المكاسب الموعودة، فظهر شعور بالنصر المبتور. دعا موسوليني إلى بناء إمبراطورية والسيطرة على المتوسط والتوسع في إفريقيا والبلقان.

### ج- آثار أزمة 1929م

أدت إلى إفلاس الأبناك والشركات وتراجع الإنتاج والبطالة والفقر وضعف الأنظمة الديمقراطية. تضررت ألمانيا وإيطاليا واليابان بسبب نقص المستعمرات والمواد الأولية والأسواق، فاتجهت إلى التسلح والتوسع.

### د- انقسام الدول الرأسمالية

توفر لبريطانيا وفرنسا والولايات المتحدة احتياطي مالي ومستعمرات وأسواق، بينما عانت ألمانيا وإيطاليا واليابان من قلة المستعمرات وضيق الأسواق ونقص الموارد، فرأت التوسع وسيلة للخروج من الاختناق.

### هـ- صعود الأنظمة الديكتاتورية

وصل هتلر سنة 1933م وألغى الديمقراطية وقمع الأحزاب وأعاد التسلح ونشر الفكر العنصري والمجال الحيوي. وأقام موسوليني دولة فاشية منذ 1922م، بينما تعاظم نفوذ العسكريين في اليابان ودعوا إلى السيطرة على آسيا.

## 2- السياسة التوسعية للدول الديكتاتورية

### أ- التوسع الياباني

احتلت اليابان منشوريا سنة 1931م وأقامت منشوكو، ثم توسعت في الصين منذ 1937م واحتلت بكين وشنغهاي ونانكين. أدانت عصبة الأمم الاحتلال، لكن اليابان انسحبت منها سنة 1933م وواصلت التوسع.

### ب- التوسع الإيطالي في إثيوبيا

غزت إيطاليا إثيوبيا سنة 1935م بهدف بناء إمبراطورية وربط إريتريا والصومال والحصول على الموارد. احتلت أديس أبابا سنة 1936م، وفشلت عقوبات عصبة الأمم في إيقافها.

### ج- التوسع الألماني

- إعادة التسلح والخدمة العسكرية.
- إعادة عسكرة الراين سنة 1936م.
- ضم النمسا سنة 1938م.

### د- الحرب الأهلية الإسبانية

دعمت ألمانيا وإيطاليا قوات فرانكو، بينما دعم الاتحاد السوفياتي الجمهوريين بصورة محدودة، واتبعت بريطانيا وفرنسا عدم التدخل. أصبحت إسبانيا ميدانًا لتجريب الأسلحة والقصف والتكتيكات، وانتهت بانتصار فرانكو سنة 1939م.

## 3- عجز عصبة الأمم وسياسة الاسترضاء

ضعفت العصبة بسبب غياب الجيش والولايات المتحدة وتضارب مصالح الدول وضعف العقوبات وانسحاب المعتدين. واتبعت بريطانيا وفرنسا سياسة الاسترضاء لتجنب حرب جديدة والخوف من الشيوعية وضعف الاستعداد العسكري، لكنها شجعت هتلر على التوسع.

## 4- تكوين التحالفات

- محور برلين–روما سنة 1936م.
- حلف مكافحة الكومنترن بين ألمانيا واليابان ثم إيطاليا.
- المحور الثلاثي سنة 1940م.
- ميثاق عدم الاعتداء الألماني السوفياتي في غشت 1939م مع بروتوكول سري لتقسيم مناطق النفوذ في أوروبا الشرقية.

## 5- السبب المباشر

هاجمت ألمانيا بولونيا يوم 1 شتنبر 1939م بأسلوب الحرب الخاطفة القائم على القصف الجوي والدبابات والاختراق السريع. أعلنت بريطانيا وفرنسا الحرب يوم 3 شتنبر.

## 6- أطراف الحرب

### دول المحور

ألمانيا وإيطاليا واليابان، وانضمت إليها هنغاريا ورومانيا وبلغاريا وسلوفاكيا في مراحل مختلفة.

### دول الحلفاء

بريطانيا وفرنسا وبولونيا، ثم الاتحاد السوفياتي والولايات المتحدة منذ 1941م، والصين والكومنولث وفرنسا الحرة وحركات المقاومة والمستعمرات.

## 7- المرحلة الأولى: انتصارات المحور 1939–1941م

### احتلال بولونيا

احتلت ألمانيا الغرب ودخل الجيش السوفياتي من الشرق، فقسمت بولونيا.

### شمال أوروبا

احتلت ألمانيا الدنمارك والنرويج سنة 1940م لحماية طرق الحديد والموانئ الاستراتيجية.

### اجتياح أوروبا الغربية وسقوط فرنسا

هاجمت ألمانيا هولندا وبلجيكا ولوكسمبورغ وفرنسا في ماي 1940م عبر الأردين، وتراجع الحلفاء من دونكيرك. سقطت باريس وانقسمت فرنسا إلى منطقة محتلة وحكومة فيشي، بينما أسس ديغول فرنسا الحرة.

### معركة بريطانيا

قصف الطيران الألماني لندن والموانئ والمصانع تمهيدًا لعملية أسد البحر، لكن بريطانيا صمدت بفضل الرادار والطيران والمقاومة، وفشل الغزو.

### شمال إفريقيا والبلقان

تقدمت إيطاليا من ليبيا نحو مصر ثم تدخل الفيلق الإفريقي بقيادة رومل. واحتلت ألمانيا يوغوسلافيا واليونان سنة 1941م لتأمين البلقان وحقول النفط والاستعداد للهجوم على السوفيات.

## 8- اتساع الحرب سنة 1941م

### عملية بارباروسا

هاجمت ألمانيا الاتحاد السوفياتي يوم 22 يونيو 1941م بهدف القضاء على الشيوعية والسيطرة على أوكرانيا والنفط والمجال الحيوي. تقدمت نحو موسكو ولينينغراد والقوقاز، لكنها واجهت اتساع الأرض والمقاومة وصعوبة الإمداد والشتاء والتعبئة السوفياتية.

### بيرل هاربور

هاجمت اليابان القاعدة الأمريكية يوم 7 دجنبر 1941م بعد العقوبات النفطية، فدخلت الولايات المتحدة الحرب وأعلنت ألمانيا وإيطاليا الحرب عليها.

## 9- المرحلة الثانية: تحول ميزان القوى 1942–1945م

### ميدواي

دمرت الولايات المتحدة حاملات طائرات يابانية في يونيو 1942م وأوقفت التوسع الياباني.

### العلمين وإنزال شمال إفريقيا

انتصرت القوات البريطانية بقيادة مونتغمري على رومل سنة 1942م. ونزل الحلفاء في المغرب والجزائر في عملية الشعلة، واستسلم المحور في تونس سنة 1943م.

### ستالينغراد

حاصر الجيش الأحمر القوات الألمانية وأجبرها على الاستسلام في فبراير 1943م، فكانت نقطة تحول أنهت التقدم الألماني في الشرق.

### تحرير أوروبا الشرقية

حرر الجيش الأحمر الأراضي السوفياتية وتقدم عبر بولونيا ورومانيا وبلغاريا وهنغاريا حتى ألمانيا، وفرض نفوذًا سوفياتيًا على أوروبا الشرقية.

### سقوط إيطاليا

نزل الحلفاء في صقلية سنة 1943م وسقط موسوليني، ثم استمرت المعارك ضد ألمانيا في شمال إيطاليا إلى 1945م.

## 10- تحرير فرنسا وهزيمة ألمانيا

أنزل الحلفاء قوات ضخمة في نورماندي يوم 6 يونيو 1944م، وحرروا باريس في غشت، ثم تقدموا نحو ألمانيا. دخل الجيش الأحمر برلين في أبريل 1945م، وانتحر هتلر، واستسلمت ألمانيا في ماي 1945م.

## 11- هزيمة اليابان

واصلت اليابان الحرب وخاضت الولايات المتحدة معارك إيو جيما وأوكيناوا. ألقت قنبلتين ذريتين على هيروشيما في 6 غشت وناغازاكي في 9 غشت 1945م، ودخل الاتحاد السوفياتي الحرب ضد اليابان في منشوريا. استسلمت اليابان في غشت ووقعت رسميًا في شتنبر 1945م.

## 12- الخسائر البشرية

خلفت الحرب عشرات الملايين من القتلى، وكانت خسائر المدنيين ضخمة بسبب القصف والمجازر والإبادة والمجاعات والتهجير والعمل القسري والسلاح النووي.

### استهداف المدنيين والإبادة النازية

استهدفت المدن بالقصف والحصار والترحيل. وطبق النظام النازي سياسة إبادة ضد اليهود والغجر والمعارضين وذوي الإعاقة وأسرى الحرب، وأنشأ معسكرات الاعتقال والإبادة وغرف الغاز.

### تغير البنية السكانية

انخفض عدد الرجال والولادات، وارتفعت أعداد الأرامل واليتامى والمعطوبين واللاجئين، ونقصت اليد العاملة، فاستقدمت دول أوروبية عمالًا من المستعمرات.

## 13- الخسائر المادية والاقتصادية

دمرت المصانع والموانئ والطرق والسكك والجسور والمطارات والمزارع والمساكن والمدارس والمستشفيات، وتراجع الإنتاج والتجارة وانتشرت البطالة وندرة السلع والسوق السوداء والتضخم.

خرجت الولايات المتحدة أقوى اقتصاديًا لأنها لم تتعرض للدمار داخل أراضيها، وارتفع إنتاجها وصادراتها واحتياطها الذهبي وأصبحت القوة الاقتصادية الأولى.

## 14- التحولات السياسية والترابية

### تراجع أوروبا وصعود القوتين العظميين

ضعفت بريطانيا وفرنسا وألمانيا وإيطاليا، وبرزت الولايات المتحدة والاتحاد السوفياتي.

### تقسيم ألمانيا

قسمت إلى مناطق أمريكية وسوفياتية وبريطانية وفرنسية، وقسمت برلين كذلك. وفي سنة 1949م قامت ألمانيا الاتحادية في الغرب وألمانيا الديمقراطية في الشرق.

### تغير الحدود وإخضاع ألمانيا واليابان

توسعت حدود الاتحاد السوفياتي وتحركت حدود بولونيا غربًا، وفقدت ألمانيا أراضي. فرض الحلفاء نزع السلاح وحل المؤسسات المتطرفة والإصلاح السياسي ومحاكمة مجرمي الحرب.

## 15- مؤتمرات الحلفاء

### طهران 1943م

ناقش فتح جبهة غربية وتنسيق العمليات ومستقبل أوروبا.

### يالطا 1945م

قرر تقسيم ألمانيا ونزع سلاحها ومحاكمة مجرمي الحرب وتنظيم مناطق النفوذ وإنشاء منظمة دولية ودخول السوفيات الحرب ضد اليابان.

### بوتسدام 1945م

ناقش إدارة ألمانيا والتعويضات والحدود ومحاكمة المجرمين وإنذار اليابان.

## 16- محاكمة مجرمي الحرب

أقيمت محاكم نورمبرغ وطوكيو بتهم شن حرب عدوانية وجرائم حرب وجرائم ضد الإنسانية والإبادة، وساهمت في تطوير القانون الجنائي الدولي.

## 17- إنشاء هيئة الأمم المتحدة

أقر ميثاق الأمم المتحدة في مؤتمر سان فرانسيسكو سنة 1945م، ودخل حيز التنفيذ في 24 أكتوبر.

### أهدافها

حفظ السلم والأمن، حل النزاعات سلميًا، احترام حقوق الإنسان، التعاون والتنمية، والمساواة وحق الشعوب في تقرير المصير.

### أجهزتها

الجمعية العامة ومجلس الأمن والأمانة العامة ومحكمة العدل والمجلس الاقتصادي والاجتماعي ومجلس الوصاية. وتتمتع الولايات المتحدة والاتحاد السوفياتي ثم روسيا وبريطانيا وفرنسا والصين بالعضوية الدائمة وحق النقض.

## 18- بداية الحرب الباردة

ظهر خلاف إيديولوجي وسياسي بين النظام الاشتراكي السوفياتي والنظام الرأسمالي الليبرالي، وانقسمت أوروبا إلى شرق شيوعي وغرب مرتبط بالولايات المتحدة، وظهر الستار الحديدي والثنائية القطبية.

## 19- تصاعد الحركات التحررية

أضعفت الحرب القوى الاستعمارية، وشارك أبناء المستعمرات في القتال، وانتشرت مبادئ الحرية وتقرير المصير، ونما الوعي القومي، فتصاعدت حركات الاستقلال في آسيا وإفريقيا والعالم العربي.

## 20- النتائج العلمية والتقنية

تسارع تطور الطيران والرادار والصواريخ والطب والأدوية والاتصال والطاقة النووية والحواسيب الأولى، لكن العلم استعمل أيضًا في التدمير، خاصة القنبلة الذرية.

## خاتمة

اندلعت الحرب نتيجة مخلفات فرساي وأزمة 1929م وصعود الديكتاتوريات والتوسع وعجز عصبة الأمم والاسترضاء. مرت بمرحلة انتصارات المحور ثم تحول ميزان القوى بعد دخول السوفيات والولايات المتحدة وانتصارات ميدواي والعلمين وستالينغراد وإنزال نورماندي.

وخلفت خسائر بشرية ومادية هائلة، وأنهت مركزية أوروبا، وبرزت الولايات المتحدة والاتحاد السوفياتي، وانقسم العالم إلى معسكرين وبدأت الحرب الباردة. كما أنشئت الأمم المتحدة وتصاعدت الحركات التحررية وظهر نظام دولي جديد قائم على الثنائية القطبية.`;
