[build]
  publish = "."

[[redirects]]
  from = "/rihlat-aloula-bac/*"
  to = "/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
