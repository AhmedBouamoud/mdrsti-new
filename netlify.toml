[build]
  command = "rm -rf dist unpack package.zip && base64 -d package.b64 > package.zip && mkdir -p unpack dist && unzip -q package.zip -d unpack && cp -a unpack/ahmed-projects-hub/. dist/"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
