name: Review Aloula source differences

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch candidate source without publishing
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/aloula-source
          git clone --depth 1 --branch main \
            https://github.com/AhmedBouamoud/Mdrsti.git \
            /tmp/aloula-source
          test -d /tmp/aloula-source/rihlat-aloula-bac

      - name: Compare protected production content
        shell: bash
        run: |
          set -euo pipefail
          echo 'This workflow is review-only. It never deletes or overwrites production lessons.'
          diff -qr rihlat-aloula-bac /tmp/aloula-source/rihlat-aloula-bac || true
          echo 'Protected files include index.html, assets/app.js, assets/styles.css, data/site.json, data/lessons.json, and data/lessons/*.json.'
