name: Unpack selected projects hub

on:
  push:
    branches: [main]
    paths:
      - package.b64
      - .github/workflows/unpack-package.yml

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack exact uploaded package
        shell: bash
        run: |
          set -euo pipefail
          base64 -d package.b64 > package.zip
          rm -rf extracted
          mkdir extracted
          unzip -q package.zip -d extracted
          cp -a extracted/ahmed-projects-hub/. .
          rm -rf extracted package.zip package.b64
      - name: Commit exact package contents
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use exact uploaded projects hub package" || exit 0
          git push
