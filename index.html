<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#081426">
  <title>مركز مشاريع أحمد بوعمود</title>
  <style>
    :root{--bg:#07101f;--card:#0f1d31;--card2:#142641;--line:#2b405e;--text:#f1f6ff;--muted:#9fb0c8;--gold:#f5a524;--green:#35c995;--blue:#69aaff;--violet:#b09aff}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 85% 0,rgba(245,165,36,.14),transparent 28%),radial-gradient(circle at 0 30%,rgba(82,132,220,.11),transparent 30%),var(--bg);color:var(--text);font-family:Tahoma,Arial,sans-serif;min-height:100vh}.wrap{width:min(1180px,calc(100% - 22px));margin:auto;padding:12px 0 60px}.top{position:sticky;top:7px;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(8,20,36,.93);backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:10px}.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#e57e17);color:#251706;font-weight:900}.brand h1{margin:0;font-size:16px}.brand small{display:block;color:var(--muted);font-size:10px;margin-top:3px}.version{font-size:9px;color:#ffd27b;border:1px solid rgba(245,165,36,.3);background:rgba(245,165,36,.09);padding:6px 9px;border-radius:999px;white-space:nowrap}.hero{display:grid;grid-template-columns:1.35fr .65fr;gap:18px;align-items:center;padding:44px 6px 22px}.hero h2{font-size:clamp(30px,5vw,54px);line-height:1.25;margin:0 0 12px}.hero h2 span{color:var(--gold)}.hero p{color:var(--muted);line-height:2;font-size:14px;margin:0}.stats{border:1px solid var(--line);border-radius:24px;padding:19px;background:linear-gradient(155deg,var(--card2),#0b1729)}.big{font-size:54px;color:var(--gold);font-weight:900}.stats p{margin:5px 0 0;color:var(--muted);font-size:12px}.tools{display:grid;grid-template-columns:1fr auto;gap:10px;margin:10px 0}.search{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--text);outline:none;font:inherit}.sort{padding:0 12px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--text);font:inherit}.filters{display:flex;gap:7px;overflow:auto;padding:2px 0 12px;scrollbar-width:none}.filter{white-space:nowrap;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--muted);padding:8px 12px;cursor:pointer;font:inherit;font-size:12px}.filter.on{background:var(--gold);border-color:var(--gold);color:#251706;font-weight:900}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{display:flex;flex-direction:column;min-height:230px;padding:16px;border:1px solid var(--line);border-radius:19px;background:linear-gradient(155deg,var(--card),#0a1729)}.head{display:flex;align-items:center;gap:10px}.icon{width:41px;height:41px;border-radius:12px;display:grid;place-items:center;background:var(--card2);border:1px solid var(--line);font-size:19px}.card h3{font-size:14px;margin:0;line-height:1.5}.meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}.pill{font-size:9px;padding:3px 6px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}.pill.live{color:var(--green)}.pill.development{color:var(--blue)}.pill.prototype,.pill.planning{color:var(--violet)}.desc{color:var(--muted);font-size:11px;line-height:1.9;margin:14px 0;flex:1}.actions{display:flex;gap:7px;padding-top:11px;border-top:1px solid rgba(255,255,255,.06)}.actions a{flex:1;text-align:center;text-decoration:none;padding:9px 5px;border:1px solid var(--line);border-radius:10px;background:var(--card2);color:var(--text);font-size:10px}.actions a.primary{color:#ffd27b;border-color:rgba(245,165,36,.3);background:rgba(245,165,36,.08)}.actions a.off{opacity:.3;pointer-events:none}.empty{grid-column:1/-1;text-align:center;padding:45px;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}footer{margin-top:30px;padding:18px 5px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:10px}@media(max-width:900px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}}@media(max-width:650px){.wrap{width:calc(100% - 16px)}.brand small{display:none}.hero{padding-top:32px}.hero h2{font-size:34px}.tools{grid-template-columns:1fr}.sort{height:46px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <header class="top"><div class="brand"><div class="logo">AB</div><div><h1>مركز مشاريع أحمد بوعمود</h1><small>المواقع • التطبيقات • المستودعات</small></div></div><span class="version">نسخة Vercel الصحيحة 16-07</span></header>
  <section class="hero"><div><h2>كل مشاريعك في <span>لائحة واحدة واضحة</span></h2><p>افتح مشاريع التعليم، ريم، الإدارة والأعمال مباشرة من الهاتف، وابحث عنها حسب الاسم أو المجال.</p></div><aside class="stats"><div class="big" id="total">0</div><p>مشروعاً وتطبيقاً</p></aside></section>
  <div class="tools"><input id="q" class="search" type="search" placeholder="ابحث باسم المشروع أو المجال..."><select id="sort" class="sort"><option value="featured">المميزة أولاً</option><option value="name">حسب الاسم</option><option value="status">حسب الحالة</option></select></div>
  <div id="filters" class="filters"></div>
  <section id="grid" class="grid"></section>
  <footer>لوحة الأستاذ أحمد بوعمود — markaz-ahmed-test-2026.vercel.app</footer>
</main>
<script>
const projects=[
{id:'social',name:'منصة الاجتماعيات',category:'تعليم',status:'live',description:'منصة الموارد والدروس والاختبارات والإنفوغرافيات.',site:'https://ahmedbouamoud.com',repo:'https://github.com/AhmedBouamoud/Mdrsti',featured:true},
{id:'jihawi',name:'رحلة الجهوي',category:'تعليم',status:'live',description:'مراجعة تفاعلية للاجتماعيات للثالثة إعدادي.',site:'https://rihla-jihawi.netlify.app',repo:'https://github.com/AhmedBouamoud/rihla-jihawi',featured:true},
{id:'gateway',name:'بوابة الجهوي — الجيل الثاني',category:'تعليم',status:'development',description:'بوابة حديثة لتنظيم مسارات المراجعة والدخول إلى رحلة الجهوي.',site:'https://bawabat-al-jihawi.netlify.app',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/jihawi-gateway'},
{id:'mahali',name:'رحلة المحلي',category:'تعليم',status:'development',description:'مسارات دروس الأسدس الأول ورحلة تتويج نهائية.',site:'https://rihla-mahali.netlify.app',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/mahali',featured:true},
{id:'noor',name:'نور ريم — تعليم القرآن',category:'ريم',status:'development',description:'الاستماع والتكرار والتدرج في حفظ السور القصيرة.',site:'https://rihla-jihawi.netlify.app/noor-rim-quran/',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/noor-rim-quran',featured:true},
{id:'noon',name:'عالم نون',category:'ريم',status:'development',description:'عالم قصصي تعليمي بألعاب متدرجة يكون فيه الطفل هو البطل.',site:'https://rihla-jihawi.netlify.app/alam-noon/',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/alam-noon',featured:true},
{id:'timeline',name:'الخط الزمني',category:'تعليم',status:'prototype',description:'أداة تعليمية لعرض الأحداث التاريخية زمنياً.',site:'https://rihla-jihawi.netlify.app/khat-zamani/',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/khat-zamani'},
{id:'info',name:'الإنفوغرافيا التعليمية',category:'تعليم',status:'prototype',description:'موارد بصرية وإنفوغرافيات مرتبطة بالدروس.',site:'https://rihla-jihawi.netlify.app/infographie/',repo:'https://github.com/AhmedBouamoud/rihla-jihawi/tree/main/infographie'},
{id:'ibtidai',name:'رحلة الابتدائي',category:'تعليم',status:'prototype',description:'نسخة مبسطة للصغار تعتمد المحطات والنقاط والتفاعل البصري.',site:'https://rihla-jihawi.netlify.app/ibtidai/',repo:''},
{id:'daftar',name:'دفتر الأستاذ الذكي',category:'إدارة مدرسية',status:'development',description:'دفتر نصوص وحصص وفروض وعطل ونسخ جاهزة للطباعة.',site:'https://daftar-ostad.netlify.app',repo:'',featured:true},
{id:'harissa',name:'تطبيق الحراس العامين',category:'إدارة مدرسية',status:'development',description:'واجهة مساعدة للحراس العامين في المدارس الخاصة.',site:'https://harissa-hanane.netlify.app',repo:''},
{id:'agency',name:'وكالتي Talborjt',category:'إدارة وأعمال',status:'live',description:'تتبع الفواتير والعمولات والتقارير والنسخ الاحتياطي.',site:'https://agencetalbourjte.com',repo:'',featured:true},
{id:'tayibate',name:'نظام الطيبات',category:'صحة وتوعية',status:'live',description:'موقع للتوعية بالتغذية الصحية واختيار الطيب من الطعام.',site:'https://exquisite-gnome-aed92b.netlify.app/',repo:'https://github.com/AhmedBouamoud/Altayibate-'},
{id:'farhat',name:'فرحة ريم',category:'ريم',status:'development',description:'مشروع رقمي مرتبط بريم وشعار قوتي في اختلافي.',site:'',repo:'https://github.com/AhmedBouamoud/farhat-reem'},
{id:'review',name:'مراجعة الثالثة إعدادي',category:'تعليم',status:'development',description:'موارد وتمارين للمراجعة الشاملة.',site:'',repo:'https://github.com/AhmedBouamoud/moraja3a-3ac'},
{id:'music',name:'منظم موسيقى السيارة',category:'أدوات',status:'development',description:'تنظيم ملفات MP3 في مجلدات مناسبة لراديو السيارة.',site:'',repo:'https://github.com/AhmedBouamoud/music-usb'},
{id:'dara',name:'DARA — شبكة تجربة المدينة',category:'إدارة وأعمال',status:'planning',description:'منصة تجارية للمقاهي والمطاعم وتجارب مدينة أكادير.',site:'',repo:'',featured:true}
];
const labels={live:'منشور',development:'قيد التطوير',prototype:'نموذج أولي',planning:'قيد التخطيط'};
const icons={'تعليم':'📚','ريم':'🌟','إدارة مدرسية':'🏫','إدارة وأعمال':'📊','أدوات':'🧰','صحة وتوعية':'🌿'};
let state={category:'الكل',query:'',sort:'featured'};
const safe=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function filtered(){let a=projects.filter(p=>(state.category==='الكل'||p.category===state.category)&&(!state.query||[p.name,p.category,p.description].join(' ').toLowerCase().includes(state.query.toLowerCase())));if(state.sort==='name')a.sort((x,y)=>x.name.localeCompare(y.name,'ar'));else if(state.sort==='status')a.sort((x,y)=>x.status.localeCompare(y.status));else a.sort((x,y)=>(+!!y.featured-+!!x.featured)||x.name.localeCompare(y.name,'ar'));return a}
function renderFilters(){const cats=['الكل',...new Set(projects.map(p=>p.category))];filters.innerHTML=cats.map(c=>`<button class="filter ${state.category===c?'on':''}" data-c="${safe(c)}">${safe(c)}</button>`).join('');document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{state.category=b.dataset.c;render()})}
function renderGrid(){const a=filtered();grid.innerHTML=a.length?a.map(p=>`<article class="card"><div class="head"><div class="icon">${icons[p.category]||'◈'}</div><div><h3>${safe(p.name)}</h3><div class="meta"><span class="pill ${p.status}">${labels[p.status]||safe(p.status)}</span><span class="pill">${safe(p.category)}</span></div></div></div><p class="desc">${safe(p.description)}</p><div class="actions"><a class="primary ${p.site?'':'off'}" href="${p.site||'#'}" target="_blank" rel="noopener">فتح الموقع</a><a class="${p.repo?'':'off'}" href="${p.repo||'#'}" target="_blank" rel="noopener">GitHub</a></div></article>`).join(''):'<div class="empty">لا توجد مشاريع مطابقة.</div>'}
function render(){total.textContent=projects.length;renderFilters();renderGrid()}
q.oninput=e=>{state.query=e.target.value;renderGrid()};sort.onchange=e=>{state.sort=e.target.value;renderGrid()};render();
</script>
</body>
</html>
